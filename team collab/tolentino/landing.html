<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(
                rgba(145,145,145,0.6),
                rgba(255,255,255,0.6)
            ), url("bgpho.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .box {
            width: 500px;
            padding: 35px;
            text-align: center;
            background: #fff;
            border: 3px solid #089700;
        }

        .logo {
            width: 280px;
            margin-bottom: 15px;
        }

        .buttons a {
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 3px;
        }

        .register {
            background: #089700;
            color: white;
        }

        .login {
            border: 1px solid #089700;
            color: #089700;
            margin-left: 8px;
        }
    </style>
</head>

<body>

    <div class="box">
        <img src="name.png" class="logo">

        <div class="buttons">
            <a href="register.html" class="register">Register</a>
            <a href="login.html" class="login">Login</a>
        </div>
    </div>

</body>
</html>
