<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Inter, sans-serif;
    min-height: 100vh;
    background-image: url("bgpho.jpg");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(120, 119, 119, 0.6); 
    z-index: 0;
}

.login-box {
    position: relative;
    z-index: 1;
    background: #ffffff; 
    padding: 40px 50px;
    border-radius: 0; 
    border: 3px solid #089700;
    width: 100%;
    max-width: 500px; 
    text-align: center;
}

.logo-image {
    max-width: 300px;
    height: auto;
    display: block;
    margin: 0 auto 15px auto; 
}

.form-group {
    margin-bottom: 15px;
    text-align: left; 
}

.form-group input {
    width: 100%;
    padding: 12px 15px;
    font-size: 14px;
    border: 1px solid #089700; 
    border-radius: 0; 
    background: #ffffff;
    color: #333;
    outline: none;
}

.btn-submit {
    width: auto; 
    min-width: 120px;
    padding: 10px 25px;
    background: #089700;
    color: white;
    border: none;
    border-radius: 0; 
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
}

.btn-submit:hover {
    background: #067a00;
}

.footer-text {
    margin-top: 25px;
    color: #666;
    font-size: 13px;
}

.footer-text a {
    color: #089700;
    text-decoration: none;
    font-weight: 600;
}
</style>
</head>
<body>

<div class="login-box">
    <img src="name.png" alt="Surveycio Logo" class="logo-image">
    
    <form action="dashboard.html" method="GET">
        <div class="form-group">
            <input type="email" id="email" name="email" placeholder="Email" required>
        </div>
        
        <div class="form-group">
            <input type="password" id="password" name="password" placeholder="Password" required>
        </div>
        
        <button type="submit" class="btn-submit">LOG IN</button>
    </form>
    
    <p class="footer-text">
        No account? Register now <u><a href="register.html">Register</a></u>
    </p>
</div>

</body>
</html>
