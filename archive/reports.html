                        <span style="font-weight: 600; font-size: 14px;">System Admin</span>
                        <span style="font-size: 12px; color: var(--text-muted);">admin@servicio.gov</span>

        <!-- MAIN CONTENT -->
        <main class="admin-main">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <h1>System Reports</h1>
                    <p>Visual analytics for health and vendor data.</p>
                </div>
                <div>
                    <button class="btn btn-outline" style="display: flex; align-items: center; gap: 8px;" onclick="window.print()">
                        <i class="ph ph-printer"></i> Print Report
                    </button>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
                <!-- CHART 1 -->
                <div class="table-container" style="padding: 30px;">
                    <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 24px; text-align: center;">Blood Type Distribution</h2>
                    <div style="max-width: 300px; margin: 0 auto;">
                        <canvas id="bloodTypeChart"></canvas>
                    </div>
                </div>

                <!-- CHART 2 -->
                <div class="table-container" style="padding: 30px;">
                    <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 24px; text-align: center;">Eligible Donors per Month</h2>
                    <div>
                        <canvas id="donorCountChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- CHART 3 -->
            <div class="table-container" style="padding: 30px;">
                <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 24px; text-align: center;">Vendor Registration Status</h2>
                <div style="max-width: 600px; margin: 0 auto;">
                    <canvas id="vendorCountChart"></canvas>
                </div>
            </div>

        </main>
    </div>

    <script>
        // Chart Configs
        const commonOptions = {
            responsive: true,
            plugins: { legend: { position: 'bottom' } }
        };

        // Blood Type Distribution (Doughnut)
        new Chart(document.getElementById('bloodTypeChart').getContext('2d'), {
            type: 'doughnut',
            data: {
                labels: ['O+', 'A+', 'B+', 'AB+', 'O-', 'A-', 'B-', 'AB-'],
                datasets: [{
                    data: [180, 140, 90, 30, 20, 10, 8, 4],
                    backgroundColor: ['#dc2626', '#ef4444', '#f87171', '#fca5a5', '#991b1b', '#b91c1c', '#7f1d1d', '#fee2e2'],
                    borderWidth: 1,
                    borderColor: '#ffffff'
                }]
            },
            options: commonOptions
        });

        // Donor Count (Bar)
        new Chart(document.getElementById('donorCountChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'New Donors',
                    data: [12, 19, 15, 25, 22, 30],
                    backgroundColor: '#089700',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true } }
            }
        });

        // Vendor Count (Pie)
        new Chart(document.getElementById('vendorCountChart').getContext('2d'), {
            type: 'pie',
            data: {
                labels: ['Approved', 'Pending', 'Rejected'],
                datasets: [{
                    data: [120, 25, 11],
                    backgroundColor: ['#16a34a', '#facc15', '#dc2626'],
                    borderWidth: 1,
                    borderColor: '#ffffff'
                }]
            },
            options: commonOptions
        });
    </script>
